name: Deploy Backend

on:
  push:
    branches:
      - main  # 只有 main 分支变动时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 安装 JDK 17 (匹配你的开发环境)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 2. Maven 打包
      - name: Build with Maven
        run: mvn clean package -Dmaven.test.skip=true

      # 3. 将 Jar 包通过 SCP 上传到服务器
      - name: Copy Jar to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 6415
          source: "target/backend.jar"
          target: ${{ secrets.TARGET }}
          strip_components: 1
          rm: true
          timeout: 120s

      # 4. 远程执行命令重启项目
      - name: Restart Java Project
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 6415
          script: |
            # 1. 停止旧进程（精准打击）
            pid=$(ps -ef | grep "backend.jar" | grep -v grep | awk '{print $2}')
            if [ -n "$pid" ]; then
              kill -9 $pid
            fi
            
            # 2. 进入后端目录
            cd /www/wwwroot/n0v0rland.xyz/backend
            
            # 3. 使用绝对路径启动 java (关键修改点)
            nohup /www/server/java/jdk-17.0.8/bin/java -jar -Xmx1024M -Xms256M backend.jar --spring.profiles.active=prod --server.port=9090 > log.txt 2>&1 &
            
            # 4. 检查是否启动成功
            sleep 2
            if ps -ef | grep "backend.jar" | grep -v grep; then
              echo "后端启动成功！"
            else
              echo "后端启动失败，请检查 log.txt"
              exit 1
            fi