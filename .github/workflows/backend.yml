name: Deploy Backend

on:
  push:
    branches:
      - main  # 只有 main 分支变动时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 安装 JDK 17 (匹配你的开发环境)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 2. Maven 打包
      - name: Build with Maven
        run: mvn clean package -Dmaven.test.skip=true

      # 3. 将 Jar 包通过 SCP 上传到服务器
      - name: Copy Jar to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "target/backend.jar"
          target: ${{ secrets.TARGET }}
          strip_components: 1
          # 关键增强配置：
          debug: true
          proxy_timeout: 30s

      # 4. 远程执行命令重启项目
      - name: Restart Java Project
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 找到旧的进程并杀死（根据你的 jar 包名匹配）
            pid=$(ps -ef | grep "backend.jar" | grep -v grep | awk '{print $2}')
            if [ -n "$pid" ]; then
              kill -9 $pid
              echo "已停止旧进程: $pid"
            fi
            
            # 启动新项目
            nohup java -jar ${{ secrets.TARGET }}/backend.jar --spring.profiles.active=prod > ${{ secrets.TARGET }}/log.txt 2>&1 &
            echo "项目已在后台启动"